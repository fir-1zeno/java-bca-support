name: JFrog Security Scan & Upload

on:
  push:
    branches: [ dev ]
  pull_request:
    branches: [ dev ]
  workflow_dispatch:

env:
  JFROG_URL: 'https://trial789.jfrog.io' # Update this
  MAVEN_SNAPSHOT_REPO: 'bcasd1-libs-snapshot-local'
  BUILD_NAME: 'firdaus-security-demo'
  XRAY_WATCH: 'firdaus-watches'
  JF_USER: 'firdaus.ghazali@izeno.com'

jobs:
  build-and-scan:
    # Use 'ubuntu-latest' for Unix-like or 'windows-latest' for Windows
    runs-on: ubuntu-latest
    environment: JFROG_PASSWORD

    steps:
      - name: 🏗️ Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'maven'

      - name: ⚙️ Setup JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: ${{ env.JFROG_URL }}
          JF_USER: ${{ secrets.JFROG_USER }}
          JF_PASSWORD: ${{ secrets.JFROG_PASSWORD }}

      - name: 🧪 Test Code (Optional, just testing without packaging)
        run: mvn clean test 

      - name: ⚙️ Configure JFrog Maven
        run: |
          # This tells JFrog which repository to deploy the built artifacts to
          jf mvnc --repo-deploy-releases ${{ env.MAVEN_SNAPSHOT_REPO }} --repo-deploy-snapshots ${{ env.MAVEN_SNAPSHOT_REPO }}

      - name: 📦 Build, Capture Dependencies & Upload
        run: |
          # jf mvn automatically captures the dependency tree AND uploads the artifact to Artifactory
          jf mvn clean install -DskipTests=true --build-name=${{ env.BUILD_NAME }} --build-number=${{ github.run_number }}

      - name: 📊 Publish Build Info
        if: success() 
        run: |
          jf rt build-collect-env ${{ env.BUILD_NAME }} ${{ github.run_number }}
          jf rt build-publish ${{ env.BUILD_NAME }} ${{ github.run_number }}

      - name: 🔒 Xray Build Scan
        if: success()
        run: |
          jf build-scan --fail=true ${{ env.BUILD_NAME }} ${{ github.run_number }}

      - name: 🚨 Security Gate Evaluation
        if: failure() 
        run: |
          echo "========================================="
          echo "❌ SECURITY GATE: FAILED ❌"
          echo "========================================="
          echo "Scanning failed because critical security vulnerabilities were detected!"
          exit 1
