name: .NET Build and JFrog Security Scan

on:
  push:
    branches: [ "sit" ]
  pull_request:
    branches: [ "sit" ]
  workflow_dispatch:

env:
  JFROG_URL: 'https://trial9cn0pa.jfrog.io'
  ARTIFACTORY_REPO: 'dotnet-generic-local'
  BUILD_NAME: 'SIT-simple-web-app'
  XRAY_WATCH: 'firdaus-watches'

jobs:
  build-and-scan:
    name: Build, Scan & Upload
    runs-on: ubuntu-latest
    
    steps:
      - name: 🏗️ Checkout repository
        uses: actions/checkout@v4

      - name: ☕ Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: ⚙️ Setup JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: ${{ env.JFROG_URL }}
          JF_USER: ${{ secrets.JFROG_USER }}
          JF_PASSWORD: ${{ secrets.JFROG_PASSWORD }}

      # --- SAST SCAN STEP ---
      # Following JFrog best practices for on-demand source code scanning
      - name: 🔍 JFrog SAST & Secrets Scan
        run: |
          echo "Scanning source code for vulnerabilities and secrets..."
          # Note: We use commas for exclusions in the local 'jf scan' command
          jf scan ./ \
            --sast=true \
            --secrets=true \
            --vuln=true \
            --exclusions="*.git*,*obj*,*bin*,*wwwroot/lib*"

      # --- BUILD STEP ---
      # We wrap 'dotnet' with 'jf' to record dependencies in the build-info
      - name: 📦 Build .NET application
        run: |
          jf dotnet restore SimpleWebApp.csproj --build-name=${{ env.BUILD_NAME }} --build-number=${{ github.run_number }}
          jf dotnet build SimpleWebApp.csproj --no-restore --configuration Release --build-name=${{ env.BUILD_NAME }} --build-number=${{ github.run_number }}

      - name: 📂 Publish & Upload
        run: |
          dotnet publish SimpleWebApp.csproj --no-restore --configuration Release -o ./publish_output
          jf rt upload "publish_output/*" \
            "${{ env.ARTIFACTORY_REPO }}/SimpleWebApp/${{ github.run_number }}/" \
            --build-name=${{ env.BUILD_NAME }} \
            --build-number=${{ github.run_number }}

      - name: 📊 Publish Build Info to JFrog
        if: success() 
        run: |
          jf rt build-collect-env ${{ env.BUILD_NAME }} ${{ github.run_number }}
          jf rt build-publish ${{ env.BUILD_NAME }} ${{ github.run_number }}

      - name: 🔒 Xray Build Scan (Final Gate)
        if: success()
        run: jf build-scan --fail=true ${{ env.BUILD_NAME }} ${{ github.run_number }}

      - name: 🚨 Security Gate Evaluation
        if: failure() 
        run: |
          echo "========================================="
          echo "❌ SECURITY GATE: FAILED ❌"
          echo "========================================="
          echo "Scanning failed because critical security vulnerabilities were detected!"
          exit 1
