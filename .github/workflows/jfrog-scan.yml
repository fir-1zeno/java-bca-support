name: JFrog Security Scan & Upload

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  JFROG_URL: 'https://trial789.jfrog.io' # Update this
  MAVEN_SNAPSHOT_REPO: 'bcasd1-libs-snapshot-local'
  BUILD_NAME: 'firdaus-security-demo'
  XRAY_WATCH: 'firdaus-watches'
  JF_USER: 'firdaus.ghazali@izeno.com'

jobs:
  build-and-scan:
    # Use 'ubuntu-latest' for Unix-like or 'windows-latest' for Windows
    runs-on: ubuntu-latest
    environment: JFROG_PASSWORD

    steps:
      - name: 🏗️ Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'maven'

      - name: ⚙️ Setup JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4
        env:
          # Define these in GitHub Repo Settings > Secrets and Variables > Actions
          JF_URL: ${{ env.JFROG_URL }}
          JF_USER: ${{ secrets.JFROG_USER }}
          JF_PASSWORD: ${{ secrets.JFROG_PASSWORD }}

      # CRITICAL: Use 'jf mvn' instead of 'mvn' so JFrog CLI captures ALL dependencies
      # in build-info. Without this, Xray only sees the thin JAR (0 vulnerabilities).
      # Reference: https://docs.jfrog.com/integrations/docs/example-continuous-integration-between-github-actions-and-artifactory

      - name: ⚙️ Configure Maven with JFrog CLI
        run: |
          jf mvnc \
            --repo-deploy-snapshots=${{ env.MAVEN_SNAPSHOT_REPO }}

      - name: 🧪 Build, Test & Package
        env:
          JFROG_CLI_BUILD_NAME: ${{ env.BUILD_NAME }}
          JFROG_CLI_BUILD_NUMBER: ${{ github.run_number }}
        run: |
          jf mvn clean package -DskipTests=false \
            --build-name=${{ env.BUILD_NAME }} \
            --build-number=${{ github.run_number }}

      - name: � Upload to Artifactory
        run: |
          jf rt upload "target/*.jar" \
            "${{ env.MAVEN_SNAPSHOT_REPO }}/com/bca/demo/firdaus-security-demo/1.0-SNAPSHOT/" \
            --flat=true \
            --build-name=${{ env.BUILD_NAME }} \
            --build-number=${{ github.run_number }}

      - name: 📊 Publish Build Info
        run: |
          jf rt build-collect-env ${{ env.BUILD_NAME }} ${{ github.run_number }}
          jf rt build-add-git ${{ env.BUILD_NAME }} ${{ github.run_number }}
          jf rt build-publish ${{ env.BUILD_NAME }} ${{ github.run_number }}

      - name: 🔒 Xray Build Scan
        # Server-side scan: results are stored in JFrog Xray Watch Violations
        run: |
          jf build-scan ${{ env.BUILD_NAME }} ${{ github.run_number }} --fail=true

      - name: 🔍 JFrog Xray Scan (Audit)
        # Local scan: shows detailed results in GitHub Actions logs
        if: always()
        run: |
          echo "Scanning JAR file..."
          jf scan "target/*.jar"
          echo "Running audit on project dependencies..."
          jf audit --mvn --watches=${{ env.XRAY_WATCH }}

      - name: 🚨 Security Gate Evaluation
        # The 'if: failure()' condition ensures this step ONLY runs if any prior step failed.
        if: failure() 
        run: |
          echo "========================================="
          echo "❌ SECURITY GATE: FAILED ❌"
          echo "========================================="
          echo "Scanning failed because critical security vulnerabilities were detected!"
          echo "Action Required: Scroll up and review the 'JFrog Xray Scan (Audit)' logs in GitHub to see the vulnerable dependencies."
          echo "Deployment is BLOCKED by Security Policy."
          exit 1 # Ensures the pipeline explicitly registers this as a failure
